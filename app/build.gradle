plugins { id 'com.android.application' }

android {
    namespace 'com.caposat.car'
    compileSdk 35

    defaultConfig {
        applicationId 'com.caposat.car'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
